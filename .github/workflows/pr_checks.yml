name: PR Checks

on:
  pull_request:
    branches: [ main, master ]

permissions:
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
            ~/.android/cache
          key: android-sdk-${{ runner.os }}-${{ hashFiles('**/build.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build & Test
        run: ./gradlew assembleDebug testDebugUnitTest

      - name: Upload test report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-html
          path: |
            app/build/reports/tests/testDebugUnitTest/
            wear/build/reports/tests/testDebugUnitTest/
          retention-days: 14

      - name: Publish unit test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            app/build/test-results/testDebugUnitTest/*.xml
            wear/build/test-results/testDebugUnitTest/*.xml
          check_name: Unit Test Results

  detekt:
    name: Detekt Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Path filter (changed modules)
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
            wear:
              - 'wear/**'
            common:
              - 'common/**'
      - name: Run detekt (app)
        if: steps.filter.outputs.app == 'true'
        run: ./gradlew :app:detektMain
      - name: Run detekt (wear)
        if: steps.filter.outputs.wear == 'true'
        run: ./gradlew :wear:detektMain
      - name: Run detekt (common)
        if: steps.filter.outputs.common == 'true'
        run: ./gradlew :common:detektMain
      - name: Run detekt (fallback — other changes)
        if: steps.filter.outputs.app != 'true' && steps.filter.outputs.wear != 'true' && steps.filter.outputs.common != 'true'
        run: ./gradlew :app:detektMain :wear:detektMain :common:detektMain
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-reports
          path: "**/build/reports/detekt/**"
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Remove local machine config (CI safe)
        run: rm -f local.properties
      - name: Run lint
        run: ./gradlew lintDebug
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: "**/build/reports/lint-results*"
          retention-days: 14
